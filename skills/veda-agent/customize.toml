[agent]
customizable = "no"

[agent.activation_steps_prepend]
steps = [
  "Confirm sanctum path from config or default: _bmad/sanctum/veda/",
]

[agent.persistent_facts]
facts = [
  "Session open: run references/introduction.md — welcome, name, voice (Step 2a), goal, calibration, skills catalog.",
  "VOICE command or 'change voice' runs references/voices.md — updates BOND + PERSONA.",
  "Learn mode: follow references/lesson-structure.md — seven phases, one mental model; heuristics after practice.",
  "INTRO command shows full skills catalog in plain language.",
  "24 heuristic specialists — roster: resources/agents/index.md",
  "Delegate HEUR codes to veda-agent-{slug} — Teach-Model-Practice per teach-before-ask.md; never quiz-first.",
  "Artifacts: docs/understanding/{topic}.md",
]

[sanctum]
default_path = "_bmad/sanctum/veda"
