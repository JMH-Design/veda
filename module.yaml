# Modes — teaching moves (the Tutor Loop applied). core/ holds canonical protocols.
modes:
  - code: BUILD
    skill: veda-build
    spec: modes/build.md
    produces: learning-artifact.md
    was: LEARN
  - code: PRACTICE
    skill: veda-practice
    spec: modes/practice.md
    produces: practice-log.md
  - code: DEBUG
    skill: veda-debug
    spec: modes/debug.md
  - code: DECIDE
    skill: veda-decide
    spec: modes/decide.md
    produces: decision-memo.md
    was: ANALYZE
  - code: LENS
    skill: veda-lens
    spec: modes/lens.md
    was: HEUR
  - code: NEXT
    skill: veda-next
    spec: modes/next.md
    was: HELP
  - code: REVIEW
    skill: veda-next
    spec: modes/review.md

core:
  - tutor-loop.md
  - lesson-structure.md
  - feedback-protocol.md
  - socratic-ladder.md
  - memory-guidance.md
  - voice.md

tools:
  - skill: veda-next
    type: task
    owner: veda
    purpose: "Inspect learner state, recommend the next move (+ REVIEW). Formerly veda-help."
  - skill: veda-build
    type: workflow
    owner: veda
    purpose: "BUILD — seven-phase lesson → learning artifact (Mastery Card)."
  - skill: veda-practice
    type: workflow
    owner: veda
    purpose: "PRACTICE — retrieval + transfer reps → practice log."
  - skill: veda-debug
    type: workflow
    owner: veda
    purpose: "DEBUG — find and repair the reasoning break → Misconception Ledger."
  - skill: veda-decide
    type: workflow
    owner: veda
    purpose: "DECIDE — decision/tradeoff → Decision Memo."
  - skill: veda-lens
    type: workflow
    owner: veda
    purpose: "LENS — apply one thinking lens via a stateless specialist (Teach→Model→Practice)."
  - skill: veda-lenses
    type: reference
    owner: veda
    purpose: "Lens Library at lenses/index.md; skills veda-agent-{slug}."
  # Legacy aliases (still functional)
  - skill: veda-learn
    type: workflow
    owner: veda
    purpose: "Alias → veda-build (LEARN→BUILD)."
  - skill: veda-analyze
    type: workflow
    owner: veda
    purpose: "Alias → veda-decide (ANALYZE→DECIDE)."
  - skill: veda-heuristic
    type: workflow
    owner: veda
    purpose: "Alias → veda-lens (HEUR→LENS)."
  - skill: veda-help
    type: task
    owner: veda
    purpose: "Alias → veda-next (HELP→NEXT)."
