# Veda — module manifest
# Veda: memory orchestrator. 24 stateless heuristic specialists.

code: veda
name: Veda
short: Understanding
version: 1.1.0
description: >
  Deep understanding through mental models and heuristics. Veda remembers your
  latticework and routes to dedicated specialists — one agent per thinking
  technique — producing artifacts in docs/understanding/.

install:
  - key: understanding_artifacts
    scope: team
    prompt: "Where should understanding artifacts be written?"
    default: "docs/understanding"
  - key: owner_name
    scope: user
    prompt: "Your name (for Veda's greetings)?"
    default: ""
  - key: communication_language
    scope: team
    prompt: "Language for artifacts and conversation?"
    default: "en"

phases:
  - id: 1
    code: foundations
    name: Foundations of Understanding
    produces: [first-principles, decomposition, key-drivers]
    heuristics: [FP, DEC, KD, SM, ZOOM]
  - id: 2
    code: patterns
    name: Pattern Recognition & Analogy
    produces: [analogies, schemas, archetypes]
    heuristics: [ANA, CHUNK, ARCH, RC, SN]
  - id: 3
    code: framing
    name: Framing & Questioning
    produces: [reframes, assumptions, root-causes]
    heuristics: [INV, 5W, SOC, REF, CA]
  - id: 4
    code: synthesis
    name: Synthesis & Integration
    produces: [latticework-links, principles]
    heuristics: [LAT, ABS, INT, XPOL, PERSP]
  - id: 5
    code: validation
    name: Validation & Feedback
    produces: [hypotheses, evidence-check]
    heuristics: [HYP, FB, EVD, PRED]

agents:
  - code: veda
    name: Veda
    title: Understanding Guide
    icon: "📖"
    team: understanding
    phase: all
    archetype: memory
    description: >
      Memory orchestrator. Routes to 24 heuristic specialists.
      Asks learning vs deciding; remembers latticework.
  - code: fp
    name: Petra
    title: First Principles Guide
    icon: "🪨"
    team: understanding
    phase: foundations
    archetype: stateless
    heuristic_code: FP
    skill: veda-agent-first-principles
